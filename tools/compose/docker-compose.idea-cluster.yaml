services:
  qdrant_idea_1:
    image: ${QDRANT_IDEA_IMAGE:-qdrant/qdrant:latest}
    hostname: qdrant_idea_1
    cpuset: ${QDRANT_IDEA_NODE_1_CPUSET:-0-5}
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_IDEA_NODE_1_SEARCH_THREADS:-6}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_IDEA_NODE_1_OPTIMIZER_CPU_BUDGET:-6}
      - QDRANT__LOG_LEVEL=${QDRANT_IDEA_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_IDEA_NODE_1_HTTP_PORT:-6733}:6333"
      - "${QDRANT_IDEA_NODE_1_GRPC_PORT:-6734}:6334"
    command: ["./qdrant", "--uri", "http://qdrant_idea_1:6335"]
    volumes:
      - qdrant_idea_1_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant_idea_2:
    image: ${QDRANT_IDEA_IMAGE:-qdrant/qdrant:latest}
    hostname: qdrant_idea_2
    cpuset: ${QDRANT_IDEA_NODE_2_CPUSET:-6-10}
    depends_on:
      qdrant_idea_1:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_IDEA_NODE_2_SEARCH_THREADS:-5}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_IDEA_NODE_2_OPTIMIZER_CPU_BUDGET:-5}
      - QDRANT__LOG_LEVEL=${QDRANT_IDEA_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_IDEA_NODE_2_HTTP_PORT:-6743}:6333"
      - "${QDRANT_IDEA_NODE_2_GRPC_PORT:-6744}:6334"
    command:
      [
        "bash",
        "-c",
        "sleep 5 && ./qdrant --bootstrap 'http://qdrant_idea_1:6335' --uri 'http://qdrant_idea_2:6335'",
      ]
    volumes:
      - qdrant_idea_2_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant_idea_3:
    image: ${QDRANT_IDEA_IMAGE:-qdrant/qdrant:latest}
    hostname: qdrant_idea_3
    cpuset: ${QDRANT_IDEA_NODE_3_CPUSET:-11-15}
    depends_on:
      qdrant_idea_1:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_IDEA_NODE_3_SEARCH_THREADS:-5}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_IDEA_NODE_3_OPTIMIZER_CPU_BUDGET:-5}
      - QDRANT__LOG_LEVEL=${QDRANT_IDEA_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_IDEA_NODE_3_HTTP_PORT:-6753}:6333"
      - "${QDRANT_IDEA_NODE_3_GRPC_PORT:-6754}:6334"
    command:
      [
        "bash",
        "-c",
        "sleep 8 && ./qdrant --bootstrap 'http://qdrant_idea_1:6335' --uri 'http://qdrant_idea_3:6335'",
      ]
    volumes:
      - qdrant_idea_3_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  qdrant_idea_1_storage:
  qdrant_idea_2_storage:
  qdrant_idea_3_storage:
