x-qdrant-logging: &qdrant_logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  qdrant_controller:
    image: ${QDRANT_CONTROLLER_IMAGE:-qdrant/qdrant:method4-peer-premerge}
    hostname: qdrant_controller
    cpuset: ${QDRANT_CONTROLLER_CPUSET:-0-7}
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_CONTROLLER_SEARCH_THREADS:-8}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_CONTROLLER_OPTIMIZER_CPU_BUDGET:-8}
      - QDRANT__LOG_LEVEL=${QDRANT_CONTROLLER_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_CONTROLLER_HTTP_PORT:-6833}:6333"
      - "${QDRANT_CONTROLLER_GRPC_PORT:-6834}:6334"
    command: ["./qdrant", "--uri", "http://qdrant_controller:6335"]
    volumes:
      - ${QDRANT_CONTROLLER_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/controller-cluster/controller}:/qdrant/storage
    logging: *qdrant_logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant_shard_1:
    image: ${QDRANT_SHARD_IMAGE:-qdrant/qdrant:method4-peer-premerge}
    hostname: qdrant_shard_1
    cpuset: ${QDRANT_SHARD_1_CPUSET:-8-12}
    depends_on:
      qdrant_controller:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_SHARD_1_SEARCH_THREADS:-5}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_SHARD_1_OPTIMIZER_CPU_BUDGET:-5}
      - QDRANT__LOG_LEVEL=${QDRANT_SHARD_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_SHARD_1_HTTP_PORT:-6843}:6333"
      - "${QDRANT_SHARD_1_GRPC_PORT:-6844}:6334"
    command:
      [
        "bash",
        "-c",
        "sleep 5 && ./qdrant --bootstrap 'http://qdrant_controller:6335' --uri 'http://qdrant_shard_1:6335'",
      ]
    volumes:
      - ${QDRANT_SHARD_1_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/controller-cluster/shard_1}:/qdrant/storage
    logging: *qdrant_logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant_shard_2:
    image: ${QDRANT_SHARD_IMAGE:-qdrant/qdrant:method4-peer-premerge}
    hostname: qdrant_shard_2
    cpuset: ${QDRANT_SHARD_2_CPUSET:-13-17}
    depends_on:
      qdrant_controller:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_SHARD_2_SEARCH_THREADS:-5}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_SHARD_2_OPTIMIZER_CPU_BUDGET:-5}
      - QDRANT__LOG_LEVEL=${QDRANT_SHARD_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_SHARD_2_HTTP_PORT:-6853}:6333"
      - "${QDRANT_SHARD_2_GRPC_PORT:-6854}:6334"
    command:
      [
        "bash",
        "-c",
        "sleep 7 && ./qdrant --bootstrap 'http://qdrant_controller:6335' --uri 'http://qdrant_shard_2:6335'",
      ]
    volumes:
      - ${QDRANT_SHARD_2_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/controller-cluster/shard_2}:/qdrant/storage
    logging: *qdrant_logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant_shard_3:
    image: ${QDRANT_SHARD_IMAGE:-qdrant/qdrant:method4-peer-premerge}
    hostname: qdrant_shard_3
    cpuset: ${QDRANT_SHARD_3_CPUSET:-18-22}
    depends_on:
      qdrant_controller:
        condition: service_healthy
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=${QDRANT_SHARD_3_SEARCH_THREADS:-5}
      - QDRANT__STORAGE__PERFORMANCE__OPTIMIZER_CPU_BUDGET=${QDRANT_SHARD_3_OPTIMIZER_CPU_BUDGET:-5}
      - QDRANT__LOG_LEVEL=${QDRANT_SHARD_LOG_LEVEL:-INFO}
    ports:
      - "${QDRANT_SHARD_3_HTTP_PORT:-6863}:6333"
      - "${QDRANT_SHARD_3_GRPC_PORT:-6864}:6334"
    command:
      [
        "bash",
        "-c",
        "sleep 9 && ./qdrant --bootstrap 'http://qdrant_controller:6335' --uri 'http://qdrant_shard_3:6335'",
      ]
    volumes:
      - ${QDRANT_SHARD_3_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/controller-cluster/shard_3}:/qdrant/storage
    logging: *qdrant_logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
