version: "3.7"

x-qdrant-logging: &qdrant_logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

services:
  qdrant_node_1:
    image: qdrant/qdrant:latest
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
    ports:
      - "6333:6333"
      - "6334:6334"
    command: ./qdrant --uri 'http://qdrant_node_1:6335'
    volumes:
      - ${QDRANT_NODE_1_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/manual-cluster/node_1}:/qdrant/storage
    logging: *qdrant_logging
    healthcheck:
      test: bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 5s
      timeout: 5s
      retries: 3

  qdrant_node_2:
    image: qdrant/qdrant:latest
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
    depends_on:
      - qdrant_node_1
    ports:
      - "6433:6333"
      - "6434:6334"
    command: ./qdrant --bootstrap 'http://qdrant_node_1:6335' --uri 'http://qdrant_node_2:6335'
    volumes:
      - ${QDRANT_NODE_2_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/manual-cluster/node_2}:/qdrant/storage
    logging: *qdrant_logging

  qdrant_node_3:
    image: qdrant/qdrant:latest
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__CLUSTER__ENABLED=true
      - QDRANT__CLUSTER__P2P__PORT=6335
    depends_on:
      - qdrant_node_1
    ports:
      - "6533:6333"
      - "6534:6334"
    command: ./qdrant --bootstrap 'http://qdrant_node_1:6335' --uri 'http://qdrant_node_3:6335'
    volumes:
      - ${QDRANT_NODE_3_STORAGE_DIR:-/home/taig/dry/qdrant/qdrant_storage/manual-cluster/node_3}:/qdrant/storage
    logging: *qdrant_logging
